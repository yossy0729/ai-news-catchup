name: Daily update & deploy

# 毎朝の自動更新＋GitHub Pages公開。
# - データ生成は scripts/daily-update.js（RSS/API収集。既定はルールベースで無料・APIキー不要）。
# - OPENAI_API_KEY シークレットを登録した場合のみ、自動で --llm-summary（日本語LLM要約）を有効化＝その分だけ課金。
# - 生成したサイトを GitHub Actions 方式で Pages へ公開（リポジトリ設定 Pages の Source を "GitHub Actions" にしておくこと）。

on:
  schedule:
    # 表示目標は朝7:00 JST。GitHubのcronは毎時0分が混雑し開始が30〜60分以上遅れるため、
    # 前倒し＆半端な分(:40)で実行し、7:00までに公開が終わるようバッファを取る。
    # 05:40 JST = 20:40 UTC（cronはUTC基準。なお遅延は完全には避けられない）。
    - cron: "40 20 * * *"
  workflow_dispatch: {} # 手動実行（初回テスト・任意のタイミング更新に使う）
  # mainへのpushでも公開を更新（データやサイト本体を変えたら即反映できるように）。
  push:
    branches: [main]
    paths:
      - "data/**"
      - "index.html"
      - "app.js"
      - "styles.css"
      - ".github/workflows/daily-update.yml"

# 公開の同時実行は1つに制限（実行中の公開を壊さない）。
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read # チェックアウトのみ（データはリポジトリに書き戻さず、生成物を直接公開する）
  pages: write # Pagesへデプロイ
  id-token: write # デプロイ認証(OIDC)

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # データ生成。OPENAI_API_KEY が登録されているときだけ LLM 要約を有効化する。
      # 鍵はログに出さない（-n で存在チェックのみ）。失敗時はこのステップで止まり公開は更新されない（前回が残る）。
      - name: Generate data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          FLAG=""
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is set -> enabling LLM summaries"
            FLAG="--llm-summary"
          else
            echo "No OPENAI_API_KEY -> rule-based only (free)"
          fi
          node scripts/daily-update.js $FLAG

      # 公開に必要な静的ファイルだけを集める（serve.js やスクリプトは配信しない）。
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html app.js styles.css .nojekyll _site/
          cp -r data _site/data

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
