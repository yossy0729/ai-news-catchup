name: Daily update & deploy

# 2つの工程を分離して回す:
#  - データ生成(重い: RSS/API収集＋LLM翻訳/要約): 毎朝のscheduleと手動(workflow_dispatch)のときだけ実行し、
#    生成結果を data/ にコミットして保存（次回以降の土台にする）。
#  - 公開(軽い: 静的ファイルをPagesへ): 常に実行。push(コード変更)では生成せず、コミット済みデータでそのまま公開する。
# これにより「見た目の修正をpush」は数十秒・無課金で反映、「中身の更新」は1日1回だけに分離される。

on:
  schedule:
    # 表示目標は朝7:00 JST。GitHubのcronは毎時0分が混雑し開始が30〜60分以上遅れるため、
    # 前倒し＆半端な分(:40)で実行し、7:00までに公開が終わるようバッファを取る。
    # 05:40 JST = 20:40 UTC（cronはUTC基準。なお遅延は完全には避けられない）。
    - cron: "40 20 * * *"
  workflow_dispatch: {} # 手動実行（データ生成＋公開）。スクリプト修正の動作確認にも使う。
  # mainへのpushでは「公開のみ」を更新（コード/データの変更を即反映。データ生成はしない）。
  push:
    branches: [main]
    paths:
      - "data/**"
      - "index.html"
      - "app.js"
      - "styles.css"
      - ".github/workflows/daily-update.yml"

# 公開の同時実行は1つに制限（実行中の公開を壊さない）。
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write # 生成データを data/ に書き戻す(コミット)ため。GITHUB_TOKENのpushはワークフローを再起動しない。
  pages: write # Pagesへデプロイ
  id-token: write # デプロイ認証(OIDC)

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # データ生成は schedule / 手動のときだけ。push(コード変更)ではスキップして高速・無課金にする。
      # OPENAI_API_KEY が登録されているときだけ LLM 翻訳/要約を有効化（鍵は -n で存在チェックのみ。ログに出さない）。
      - name: Generate data
        if: github.event_name != 'push'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          FLAG=""
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is set -> enabling LLM summaries"
            FLAG="--llm-summary"
          else
            echo "No OPENAI_API_KEY -> rule-based only (free)"
          fi
          node scripts/daily-update.js $FLAG

      # 生成結果を data/ にコミットして保存（次回の土台＋push公開でも最新が出るように）。
      # 変更が無ければ何もしない。GITHUB_TOKENのpushは新たなワークフローを起動しない（無限ループしない）。
      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): 自動更新（$(TZ=Asia/Tokyo date +%Y-%m-%d)分）"
            # push失敗(branch保護など)でも公開は止めない。データ保存は次回に持ち越し。
            git push || echo "WARN: data push failed; deploy continues with this run's data."
          fi

      # 公開に必要な静的ファイルだけを集める（serve.js やスクリプトは配信しない）。
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html app.js styles.css .nojekyll _site/
          cp -r data _site/data

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
